<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>SANKALP AI — CPR Safety Command</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,sans-serif}
body{background:#0B1120;color:#F1F5F9;height:100dvh;overflow:hidden}
.topbar{display:flex;align-items:center;padding:10px 16px;background:#0F172A;border-bottom:1px solid #1E293B;gap:10px;height:52px;flex-shrink:0}
.logo{font-size:15px;font-weight:800;color:#FF9933;letter-spacing:1px}
.cpr-badge{background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.3);color:#F87171;font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;letter-spacing:.05em}
.live-dot{width:8px;height:8px;border-radius:50%;background:#EF4444;animation:pulse 1s infinite;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.main-grid{display:grid;grid-template-columns:1fr 360px;height:calc(100dvh - 52px)}
@media(max-width:768px){.main-grid{grid-template-columns:1fr;height:auto;overflow:auto}}
#map-wrap{position:relative}
#map{width:100%;height:100%}
@media(max-width:768px){#map{height:55dvh}}
.map-legend{position:absolute;bottom:16px;left:12px;background:rgba(11,17,32,.95);border:1px solid #1E293B;border-radius:10px;padding:10px 12px;z-index:1000;font-size:11px;display:flex;flex-direction:column;gap:5px}
.legend-row{display:flex;align-items:center;gap:7px;color:#94A3B8}
.legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.sos-btn{position:absolute;top:16px;left:50%;transform:translateX(-50%);z-index:1000;background:#EF4444;color:#fff;border:none;border-radius:14px;padding:12px 28px;font-size:14px;font-weight:800;cursor:pointer;box-shadow:0 4px 20px rgba(239,68,68,.5);transition:all .2s;letter-spacing:.5px}
.sos-btn:hover{background:#DC2626;transform:translateX(-50%) scale(1.03)}
.loc-btn{position:absolute;top:16px;right:12px;z-index:1000;background:#0F172A;color:#93C5FD;border:1px solid #1E3A5F;border-radius:10px;padding:8px 14px;font-size:12px;cursor:pointer;font-weight:600;transition:all .2s}
.loc-btn.tracking{background:#1E3A5F;border-color:#3B82F6;color:#60A5FA}
.side{display:flex;flex-direction:column;background:#0F172A;border-left:1px solid #1E293B;overflow:hidden}
.kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:10px 12px;border-bottom:1px solid #1E293B;flex-shrink:0}
.kpi{background:#1E293B;border-radius:8px;padding:9px;text-align:center}
.kpi-n{font-size:20px;font-weight:800}
.kpi-l{font-size:9px;color:#64748B;text-transform:uppercase;letter-spacing:.05em}
.side-tabs{display:flex;border-bottom:1px solid #1E293B;flex-shrink:0}
.tab{flex:1;padding:9px 6px;text-align:center;font-size:11px;font-weight:700;cursor:pointer;color:#64748B;border-bottom:2px solid transparent;transition:all .2s;letter-spacing:.03em}
.tab.active{color:#EF4444;border-bottom-color:#EF4444}
.side-content{flex:1;overflow-y:auto;padding:12px}
.inc-card{background:#1E293B;border:1px solid #334155;border-radius:10px;padding:12px;margin-bottom:8px;cursor:pointer;transition:all .2s}
.inc-card:hover,.inc-card.sel{border-color:#EF4444;box-shadow:0 0 12px rgba(239,68,68,.15)}
.status-badge{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;padding:2px 8px;border-radius:20px}
.st-active{background:rgba(239,68,68,.15);color:#F87171;border:1px solid rgba(239,68,68,.3)}
.st-patrol_dispatched{background:rgba(245,158,11,.15);color:#FCD34D;border:1px solid rgba(245,158,11,.3)}
.st-police_responding{background:rgba(147,197,253,.15);color:#93C5FD;border:1px solid rgba(147,197,253,.3)}
.st-safe,.st-closed{background:rgba(34,197,94,.15);color:#86EFAC;border:1px solid rgba(34,197,94,.3)}
.patrol-card{background:#1E293B;border:1px solid #334155;border-radius:10px;padding:11px;margin-bottom:7px}
.pstatus-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:6px;flex-shrink:0}
.action-btn{padding:6px 12px;border-radius:8px;font-size:11px;font-weight:700;cursor:pointer;border:none;transition:all .2s;letter-spacing:.02em}
.btn-g{background:rgba(34,197,94,.15);color:#86EFAC;border:1px solid rgba(34,197,94,.3)}
.btn-g:hover{background:rgba(34,197,94,.3)}
.timer{font-family:monospace;color:#F59E0B;font-size:12px;font-weight:700}
.esc-badge{display:inline-block;padding:2px 7px;border-radius:12px;font-size:9px;font-weight:700;text-transform:uppercase}
.esc-2{background:rgba(245,158,11,.15);color:#FCD34D;border:1px solid rgba(245,158,11,.3)}
.esc-3{background:rgba(239,68,68,.15);color:#F87171;border:1px solid rgba(239,68,68,.3)}
.esc-4{background:rgba(220,38,38,.3);color:#FCA5A5;border:1px solid rgba(220,38,38,.5);animation:pulse 1s infinite}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:9999;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:#1E293B;border:1px solid #334155;border-radius:16px;padding:24px;width:100%;max-width:440px;max-height:90dvh;overflow-y:auto}
.modal h2{font-size:16px;font-weight:700;color:#F1F5F9;margin-bottom:16px}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:12px;color:#94A3B8;margin-bottom:5px;font-weight:600}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:9px 12px;background:#0F172A;border:1px solid #334155;border-radius:8px;color:#F1F5F9;font-size:13px;outline:none}
.form-group textarea{min-height:70px;resize:vertical}
.modal-btns{display:flex;gap:8px;margin-top:16px}
.mb-cancel{flex:1;padding:9px;background:#334155;border:none;color:#94A3B8;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600}
.mb-submit{flex:2;padding:9px;background:#EF4444;border:none;color:#fff;border-radius:8px;cursor:pointer;font-size:13px;font-weight:700;transition:all .2s}
.mb-submit:hover{background:#DC2626}
.mb-submit:disabled{opacity:.5}
.toast{position:fixed;bottom:24px;right:24px;background:#1E293B;border:1px solid #334155;border-radius:12px;padding:12px 16px;z-index:99999;font-size:13px;max-width:320px;animation:slideIn .3s ease}
@keyframes slideIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback} = React;
const API = window.location.origin;
const UK_DISTRICTS = ["Dehradun","Haridwar","Nainital","Udham Singh Nagar","Almora","Pithoragarh","Chamoli","Uttarkashi","Tehri Garhwal","Pauri Garhwal","Champawat","Bageshwar","Rudraprayag"];

function timeAgo(d){
  if(!d) return "—";
  const s=Math.round((Date.now()-new Date(d))/1000);
  if(s<60) return `${s}s ago`;
  if(s<3600) return `${Math.round(s/60)}m ago`;
  return `${Math.round(s/3600)}h ago`;
}

function ElapsedTimer({since}) {
  const [secs,setSecs]=useState(Math.round((Date.now()-new Date(since))/1000));
  useEffect(()=>{const t=setInterval(()=>setSecs(Math.round((Date.now()-new Date(since))/1000)),1000);return()=>clearInterval(t);},[since]);
  const m=Math.floor(secs/60),s=secs%60;
  return <span className="timer">{String(m).padStart(2,"0")}:{String(s).padStart(2,"0")}</span>;
}

function Toast({msg,onClose}) {
  useEffect(()=>{const t=setTimeout(onClose,4000);return()=>clearTimeout(t);},[]);
  return <div className="toast">{msg}</div>;
}

function SOSModal({onClose,onSubmit,userGeo}) {
  const [name,setName]=useState("");
  const [district,setDistrict]=useState("Dehradun");
  const [location,setLocation]=useState("");
  const [submitting,setSubmitting]=useState(false);
  const [geoStatus,setGeoStatus]=useState(userGeo?"📍 Location detected":"Detecting location...");
  const [geo,setGeo]=useState(userGeo||null);

  useEffect(()=>{
    if(!userGeo && navigator.geolocation){
      navigator.geolocation.getCurrentPosition(
        pos=>{setGeo({lat:pos.coords.latitude,lng:pos.coords.longitude});setGeoStatus(`📍 ${pos.coords.latitude.toFixed(4)}, ${pos.coords.longitude.toFixed(4)}`);},
        ()=>setGeoStatus("⚠️ Location not detected — enter manually")
      );
    }
  },[]);

  const submit = async()=>{
    if(!name.trim()||!location.trim()) return;
    setSubmitting(true);
    try {
      const r=await fetch(`${API}/api/cpr/incidents`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({
        citizenName:name.trim(),district,location:location.trim(),
        lat:geo?.lat||30.3165,lng:geo?.lng||78.0322,
      })});
      const inc=await r.json();
      onSubmit(inc);
    } catch(e){ alert("Failed to send SOS: "+e.message); }
    finally { setSubmitting(false); }
  };

  return (
    <div className="modal-bg" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal">
        <h2>🆘 Send Emergency SOS</h2>
        <div style={{background:"rgba(239,68,68,.1)",border:"1px solid rgba(239,68,68,.3)",borderRadius:8,padding:"10px 14px",marginBottom:16,fontSize:12,color:"#F87171"}}>
          This will immediately alert nearby patrol vans and police. Use only in genuine emergencies.
        </div>
        <div className="form-group"><label>Your Name *</label><input value={name} onChange={e=>setName(e.target.value)} placeholder="Full name"/></div>
        <div className="form-group">
          <label>District *</label>
          <select value={district} onChange={e=>setDistrict(e.target.value)}>{UK_DISTRICTS.map(d=><option key={d}>{d}</option>)}</select>
        </div>
        <div className="form-group"><label>Location Description *</label><textarea value={location} onChange={e=>setLocation(e.target.value)} placeholder="Describe your exact location (landmark, road name, area)"/></div>
        <div style={{fontSize:11,color:"#64748B",padding:"6px 10px",background:"#0F172A",borderRadius:6,marginBottom:14}}>{geoStatus}</div>
        <div className="modal-btns">
          <button className="mb-cancel" onClick={onClose}>Cancel</button>
          <button className="mb-submit" onClick={submit} disabled={submitting||!name.trim()||!location.trim()}>
            {submitting?"Sending SOS...":"🆘 SEND EMERGENCY SOS"}
          </button>
        </div>
      </div>
    </div>
  );
}

function CPRPortal() {
  const [tab,setTab]=useState("incidents");
  const [incidents,setIncidents]=useState([]);
  const [patrols,setPatrols]=useState([]);
  const [selInc,setSelInc]=useState(null);
  const [showSOS,setShowSOS]=useState(false);
  const [tracking,setTracking]=useState(false);
  const [userGeo,setUserGeo]=useState(null);
  const [toast,setToast]=useState(null);
  const mapRef=useRef(null);
  const mapObj=useRef(null);
  const markers=useRef({incidents:{},patrols:{},user:null});
  const watchId=useRef(null);
  const esRef=useRef(null);

  const showToast=useCallback((msg)=>{setToast(msg);},[]);

  useEffect(()=>{
    fetch(`${API}/api/cpr/incidents`).then(r=>r.json()).then(d=>setIncidents(Array.isArray(d)?d:[])).catch(()=>{});
    fetch(`${API}/api/cpr/patrols`).then(r=>r.json()).then(d=>setPatrols(Array.isArray(d)?d:[])).catch(()=>{});

    const es=new EventSource(`${API}/api/cpr/stream`);
    esRef.current=es;
    es.onmessage=e=>{
      try{
        const d=JSON.parse(e.data);
        if(d.type==="safety_incident_new") { setIncidents(prev=>[d.incident,...prev]); showToast(`🆘 NEW SOS: ${d.incident.citizenName} — ${d.incident.district}`); }
        if(d.type==="incident_updated") setIncidents(prev=>prev.map(i=>i.id===d.incident.id?d.incident:i));
        if(d.type==="incident_escalated") { setIncidents(prev=>prev.map(i=>i.id===d.incident.id?d.incident:i)); showToast(`⚠️ ESCALATED: ${d.incident.district} — Level ${d.level}`); }
      } catch {}
    };
    return ()=>{es.close();stopTracking();};
  },[]);

  useEffect(()=>{
    if(!mapRef.current||mapObj.current) return;
    const map=L.map(mapRef.current,{center:[30.0668,79.0193],zoom:7,zoomControl:true});
    L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png",{attribution:"© OpenStreetMap © CARTO",maxZoom:19}).addTo(map);
    mapObj.current=map;
    if(navigator.geolocation){
      navigator.geolocation.getCurrentPosition(pos=>{setUserGeo({lat:pos.coords.latitude,lng:pos.coords.longitude});map.setView([pos.coords.latitude,pos.coords.longitude],11);}),()=>{};
    }
  },[]);

  useEffect(()=>{
    const map=mapObj.current; if(!map) return;
    incidents.forEach(inc=>{
      const col=inc.status==="active"?"#EF4444":inc.status==="safe"?"#22C55E":"#F59E0B";
      const icon=L.divIcon({className:"",html:`<div style="width:16px;height:16px;background:${col};border:2.5px solid white;border-radius:50%;box-shadow:0 0 8px ${col}88"></div>`,iconSize:[16,16]});
      const popup=`<div style="font-size:12px;min-width:180px"><b>⚠️ ${inc.citizenName}</b><br/><span>${inc.location}</span><br/><span>${inc.district} · ${(inc.status||"").replace("_"," ")}</span>${inc.assignedPatrolVan?`<br/><b style="color:#F59E0B">🚔 ${inc.assignedPatrolVan}</b><br/>${inc.assignedPatrolOfficer}`:""}</div>`;
      if(markers.current.incidents[inc.id]){markers.current.incidents[inc.id].setLatLng([inc.geo.lat,inc.geo.lng]).setIcon(icon);}
      else{const m=L.marker([inc.geo.lat,inc.geo.lng],{icon}).addTo(map).bindPopup(popup);markers.current.incidents[inc.id]=m;}
    });
  },[incidents]);

  useEffect(()=>{
    const map=mapObj.current; if(!map) return;
    patrols.forEach(v=>{
      const col=v.status==="active_patrol"?"#22C55E":v.status==="responding"?"#F59E0B":"#64748B";
      const icon=L.divIcon({className:"",html:`<div style="width:12px;height:12px;background:${col};border:2px solid white;border-radius:2px;transform:rotate(45deg);box-shadow:0 0 5px ${col}66"></div>`,iconSize:[12,12]});
      if(markers.current.patrols[v.id]){markers.current.patrols[v.id].setLatLng([v.geo.lat,v.geo.lng]).setIcon(icon);}
      else{const m=L.marker([v.geo.lat,v.geo.lng],{icon}).addTo(map).bindPopup(`<b>🚔 ${v.vanNumber}</b><br/>${v.officerInCharge}<br/>${v.zone}`);markers.current.patrols[v.id]=m;}
    });
  },[patrols]);

  const startTracking=()=>{
    if(!navigator.geolocation){showToast("Geolocation not supported");return;}
    setTracking(true); showToast("📍 Live location tracking started");
    watchId.current=navigator.geolocation.watchPosition(pos=>{
      const geo={lat:pos.coords.latitude,lng:pos.coords.longitude};
      setUserGeo(geo);
      const map=mapObj.current;
      if(map){
        const icon=L.divIcon({className:"",html:`<div style="width:14px;height:14px;background:#3B82F6;border:3px solid white;border-radius:50%;box-shadow:0 0 10px #3B82F666"></div>`,iconSize:[14,14]});
        if(markers.current.user){markers.current.user.setLatLng([geo.lat,geo.lng]);}
        else{markers.current.user=L.marker([geo.lat,geo.lng],{icon}).addTo(map).bindPopup("📍 Your Location");map.setView([geo.lat,geo.lng],13);}
      }
    },{enableHighAccuracy:true,maximumAge:5000,timeout:10000},()=>{showToast("⚠️ Location access denied");setTracking(false);});
  };
  const stopTracking=()=>{if(watchId.current!=null){navigator.geolocation.clearWatch(watchId.current);watchId.current=null;}setTracking(false);};

  const markSafe=async(id)=>{
    await fetch(`${API}/api/cpr/incidents/${id}/update`,{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify({status:"safe",message:"Confirmed safe by CPR command."})}).catch(()=>{});
    setIncidents(prev=>prev.map(i=>i.id===id?{...i,status:"safe"}:i));
    showToast("✅ Incident marked as safe");
  };

  const activeIncs=incidents.filter(i=>i.status!=="safe"&&i.status!=="closed");
  const kpis=[{n:activeIncs.length,l:"Active",c:"#F87171"},{n:patrols.filter(v=>v.status==="active_patrol").length,l:"On Patrol",c:"#86EFAC"},{n:patrols.filter(v=>v.status==="responding").length,l:"Responding",c:"#FCD34D"}];

  return (
    <div style={{display:"flex",flexDirection:"column",height:"100dvh"}}>
      <div className="topbar">
        <div className="logo">SANKALP AI</div>
        <div className="cpr-badge">CPR COMMAND</div>
        {activeIncs.length>0&&<><div className="live-dot"/><span style={{fontSize:11,color:"#F87171",fontWeight:700}}>{activeIncs.length} ACTIVE</span></>}
        <span style={{marginLeft:"auto",fontSize:11,color:"#64748B"}}>Uttarakhand Safety Command</span>
        <a href="/web/dept" style={{color:"#64748B",fontSize:11,textDecoration:"none",padding:"4px 8px",background:"#1E293B",borderRadius:6,border:"1px solid #334155"}}>🏛️ Dept</a>
        <a href="/" style={{color:"#64748B",fontSize:11,textDecoration:"none",padding:"4px 8px",background:"#1E293B",borderRadius:6,border:"1px solid #334155"}}>← Home</a>
      </div>

      <div className="main-grid">
        <div id="map-wrap">
          <div id="map" ref={mapRef}/>
          <button className="sos-btn" onClick={()=>setShowSOS(true)}>🆘 SEND SOS ALERT</button>
          <button className={`loc-btn ${tracking?"tracking":""}`} onClick={tracking?stopTracking:startTracking}>
            {tracking?"⏹ Stop Tracking":"📍 Track My Location"}
          </button>
          <div className="map-legend">
            <div className="legend-row"><div className="legend-dot" style={{background:"#EF4444"}}/><span>Active SOS incident</span></div>
            <div className="legend-row"><div className="legend-dot" style={{background:"#F59E0B"}}/><span>Patrol dispatched</span></div>
            <div className="legend-row"><div className="legend-dot" style={{background:"#22C55E"}}/><span>Citizen safe</span></div>
            <div className="legend-row"><div className="legend-dot" style={{background:"#22C55E",borderRadius:2,transform:"rotate(45deg)"}}/><span>Active patrol van</span></div>
            <div className="legend-row"><div className="legend-dot" style={{background:"#3B82F6"}}/><span>Your location</span></div>
          </div>
        </div>

        <div className="side">
          <div className="kpis">{kpis.map(k=><div className="kpi" key={k.l}><div className="kpi-n" style={{color:k.c}}>{k.n}</div><div className="kpi-l">{k.l}</div></div>)}</div>
          <div className="side-tabs">
            {[["incidents",`Incidents (${activeIncs.length})`],["patrols",`Patrols (${patrols.length})`]].map(([t,l])=>(
              <div key={t} className={`tab ${tab===t?"active":""}`} onClick={()=>setTab(t)}>{l}</div>
            ))}
          </div>
          <div className="side-content">
            {tab==="incidents"&&(
              incidents.length===0
                ? <div style={{textAlign:"center",color:"#64748B",padding:"40px 16px"}}>No safety incidents yet.<br/>Send an SOS to test the system.</div>
                : incidents.map(inc=>(
                  <div key={inc.id} className={`inc-card ${selInc===inc.id?"sel":""}`} onClick={()=>{setSelInc(inc.id);mapObj.current?.flyTo([inc.geo.lat,inc.geo.lng],13,{duration:1});}}>
                    <div style={{display:"flex",gap:6,alignItems:"center",marginBottom:6,flexWrap:"wrap"}}>
                      <span className={`status-badge st-${inc.status}`}>{(inc.status||"").replace("_"," ")}</span>
                      {inc.escalationLevel>=2&&<span className={`esc-badge esc-${inc.escalationLevel}`}>ESC L{inc.escalationLevel}</span>}
                      <span style={{fontSize:10,color:"#64748B",marginLeft:"auto"}}><ElapsedTimer since={inc.reportedAt}/></span>
                    </div>
                    <div style={{fontSize:13,color:"#E2E8F0",fontWeight:600,marginBottom:2}}>{inc.citizenName}</div>
                    <div style={{fontSize:11,color:"#64748B",marginBottom:6}}>📍 {inc.location}<br/>{inc.district}</div>
                    {inc.assignedPatrolVan&&(
                      <div style={{fontSize:11,color:"#FCD34D",marginBottom:6,padding:"4px 8px",background:"rgba(245,158,11,.1)",borderRadius:6}}>
                        🚔 {inc.assignedPatrolVan} · {inc.assignedPatrolOfficer}<br/>
                        📞 <a href={`tel:${inc.assignedPatrolPhone}`} style={{color:"#93C5FD"}}>{inc.assignedPatrolPhone}</a>
                        {inc.eta&&<span style={{marginLeft:8}}>ETA ~{inc.eta}m</span>}
                      </div>
                    )}
                    {inc.status!=="safe"&&inc.status!=="closed"&&(
                      <button className="action-btn btn-g" onClick={e=>{e.stopPropagation();markSafe(inc.id);}}>✓ Mark Safe</button>
                    )}
                  </div>
                ))
            )}
            {tab==="patrols"&&patrols.map(v=>(
              <div key={v.id} className="patrol-card">
                <div style={{display:"flex",alignItems:"center",marginBottom:5,gap:6}}>
                  <span className="pstatus-dot" style={{background:v.status==="active_patrol"?"#22C55E":v.status==="responding"?"#F59E0B":"#64748B"}}/>
                  <span style={{fontSize:12,fontWeight:700,color:"#E2E8F0",flex:1}}>{v.vanNumber}</span>
                  {v.isWomenSafetyUnit&&<span style={{fontSize:9,color:"#A78BFA",background:"rgba(124,58,237,.15)",border:"1px solid rgba(124,58,237,.3)",padding:"1px 6px",borderRadius:20,fontWeight:700}}>🛡️ WOMEN</span>}
                  {v.shift==="night"&&<span style={{fontSize:11,color:"#93C5FD"}}>🌙</span>}
                </div>
                <div style={{fontSize:11,color:"#94A3B8"}}>{v.officerInCharge} · {v.crewCount} crew</div>
                <div style={{fontSize:11,color:"#64748B",marginTop:2}}>{v.zone} · {v.district}</div>
                <div style={{display:"flex",gap:8,alignItems:"center",marginTop:8}}>
                  <span style={{fontSize:10,color:v.status==="active_patrol"?"#86EFAC":v.status==="responding"?"#FCD34D":"#64748B",fontWeight:700}}>{(v.status||"").replace("_"," ").toUpperCase()}</span>
                  <a href={`tel:${v.officerPhone}`} style={{marginLeft:"auto",fontSize:11,color:"#93C5FD",textDecoration:"none",background:"rgba(30,58,95,.5)",border:"1px solid #1E3A5F",padding:"3px 10px",borderRadius:6}}>📞 {v.officerPhone}</a>
                </div>
              </div>
            ))}
          </div>
        </div>
      </div>

      {showSOS&&<SOSModal userGeo={userGeo} onClose={()=>setShowSOS(false)} onSubmit={inc=>{setShowSOS(false);setIncidents(prev=>[inc,...prev]);showToast(`🆘 SOS sent! ${inc.assignedPatrolVan?"Nearest patrol: "+inc.assignedPatrolVan:"Being assigned..."}`);mapObj.current?.flyTo([inc.geo.lat,inc.geo.lng],13);}}/>}
      {toast&&<Toast msg={toast} onClose={()=>setToast(null)}/>}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<CPRPortal/>);
</script>
</body>
</html>
