<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#0d1117;color:#e6edf3;min-height:100vh}
:root{--orange:#FF9933;--orange-dim:#cc7a29;--bg:#0d1117;--sidebar:#080d18;--card:#161b22;--border:#30363d;--text:#e6edf3;--muted:#8b949e;--green:#3fb950;--red:#f85149;--blue:#58a6ff;--yellow:#d29922;--purple:#bc8cff}
@keyframes fadeIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideLeft{from{opacity:0;transform:translateX(-18px)}to{opacity:1;transform:translateX(0)}}
@keyframes bounceIn{0%{opacity:0;transform:scale(.88)}60%{transform:scale(1.04)}100%{opacity:1;transform:scale(1)}}
@keyframes shimmer{0%{background-position:-400% 0}100%{background-position:400% 0}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes flash{0%{background:rgba(255,153,51,.28)}100%{background:transparent}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
@keyframes glow{0%,100%{box-shadow:0 0 8px rgba(255,153,51,.3)}50%{box-shadow:0 0 24px rgba(255,153,51,.7)}}
@keyframes ripple{0%{transform:scale(1);opacity:.6}100%{transform:scale(2.5);opacity:0}}
.fade-in{animation:fadeIn .38s ease both}
.slide-left{animation:slideLeft .35s ease both}
.bounce-in{animation:bounceIn .32s ease both}
.spin{animation:spin 1s linear infinite}
.flash{animation:flash 1.8s ease-out}
.pulse{animation:pulse 2s infinite}
.glow{animation:glow 2.5s infinite}
.skeleton{background:linear-gradient(90deg,#1c2128 25%,#21262d 50%,#1c2128 75%);background-size:400%;animation:shimmer 1.5s infinite;border-radius:6px;color:transparent;pointer-events:none}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:600;transition:all .15s;white-space:nowrap;user-select:none}
.btn-orange{background:var(--orange);color:#000}.btn-orange:hover{background:var(--orange-dim);transform:translateY(-1px)}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border)}.btn-ghost:hover{background:#1c2128;color:var(--text)}
.btn-red{background:#da3633;color:#fff}.btn-red:hover{background:#b91c1c}
.btn-green{background:#238636;color:#fff}.btn-green:hover{background:#196c2e}
.btn-blue{background:#1f6feb;color:#fff}.btn-blue:hover{background:#1158c7}
.btn-yellow{background:#9e6a03;color:#fff}.btn-yellow:hover{background:#7d5302}
.btn-sm{padding:4px 10px;font-size:12px}
.btn:disabled{opacity:.45;cursor:not-allowed;transform:none!important}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;transition:border-color .2s}
.card:hover{border-color:#484f58}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600}
.badge-orange{background:rgba(255,153,51,.15);color:var(--orange)}
.badge-green{background:rgba(63,185,80,.15);color:var(--green)}
.badge-red{background:rgba(248,81,73,.15);color:var(--red)}
.badge-blue{background:rgba(88,166,255,.15);color:var(--blue)}
.badge-yellow{background:rgba(210,153,34,.15);color:var(--yellow)}
.badge-muted{background:rgba(139,148,158,.12);color:var(--muted)}
.badge-purple{background:rgba(188,140,255,.15);color:var(--purple)}
.input{width:100%;padding:10px 14px;background:#1c2128;border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;outline:none;transition:border .15s}
.input:focus{border-color:var(--orange)}
.select{width:100%;padding:10px 14px;background:#1c2128;border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;outline:none;cursor:pointer}
.select:focus{border-color:var(--orange)}
label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px 20px;transition:all .2s;position:relative;overflow:hidden}
.kpi::after{content:'';position:absolute;inset:0;border-radius:12px;opacity:0;transition:opacity .2s;background:radial-gradient(circle at top right,rgba(255,153,51,.06),transparent)}
.kpi:hover::after{opacity:1}

.table{width:100%;border-collapse:collapse;font-size:13px}
.table th{padding:10px 14px;text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);border-bottom:1px solid var(--border);white-space:nowrap;background:rgba(0,0,0,.15)}
.table td{padding:11px 14px;border-bottom:1px solid #21262d;vertical-align:middle}
.table tr:hover td{background:rgba(255,153,51,.03)}
.sidebar{width:230px;min-height:100vh;background:var(--sidebar);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;z-index:10}
.sidebar-logo{padding:18px 16px 16px;border-bottom:1px solid var(--border);flex-shrink:0}
.sidebar-nav{flex:1;padding:10px 8px;overflow-y:auto}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:500;color:var(--muted);transition:all .15s;margin-bottom:2px;position:relative}

.main{margin-left:230px;padding:26px;min-height:100vh}

.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
.progress{height:6px;border-radius:3px;background:#21262d;overflow:hidden}
.progress-bar{height:100%;border-radius:3px;background:var(--orange);transition:width .7s ease}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.78);display:flex;align-items:center;justify-content:center;z-index:200;padding:16px;backdrop-filter:blur(5px)}
.modal{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:28px;width:100%;max-width:560px;max-height:92vh;overflow-y:auto;animation:bounceIn .28s ease}
.live-dot{width:8px;height:8px;border-radius:50%;background:#3fb950;display:inline-block;flex-shrink:0}
.live-dot.red{background:var(--red)}.live-dot.orange{background:var(--orange)}
.divider{border:none;border-top:1px solid var(--border);margin:16px 0}
.worker-card{background:#1c2128;border:1px solid var(--border);border-radius:10px;padding:14px;transition:all .2s}
.worker-card:hover{border-color:var(--orange);background:#21262d}
.dept-hero{border-radius:12px;padding:20px;border:1px solid;margin-bottom:16px}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:#0d1117}
::-webkit-scrollbar-thumb{background:#30363d;border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#484f58}
@media(max-width:900px){.sidebar{width:58px}.sidebar .nav-label,.sidebar .sidebar-logo-text,.sidebar .nav-badge{display:none}.main{margin-left:58px;padding:16px}.grid4{grid-template-columns:repeat(2,1fr)}.grid3{grid-template-columns:1fr 1fr}}
@media(max-width:600px){.grid2{grid-template-columns:1fr}.grid4{grid-template-columns:1fr 1fr}}
/* ── LIVE TICKER ─── */
@keyframes ticker{0%{transform:translateX(100%)}100%{transform:translateX(-100%)}}
@keyframes tickerAlt{0%{transform:translateX(0)}100%{transform:translateX(-200%)}}
.ticker-wrap{background:linear-gradient(90deg,rgba(255,153,51,.12),rgba(255,153,51,.06));border-bottom:1px solid rgba(255,153,51,.25);padding:7px 0;overflow:hidden;position:relative;flex-shrink:0}
.ticker-inner{display:flex;align-items:center;white-space:nowrap;animation:ticker 32s linear infinite}
.ticker-inner:hover{animation-play-state:paused}
.ticker-item{font-size:12px;color:var(--text);padding:0 32px;opacity:.9}
.ticker-sep{color:var(--orange);font-size:14px;padding:0 8px}
.ticker-label{position:absolute;left:0;top:0;bottom:0;background:var(--sidebar);display:flex;align-items:center;padding:0 14px;font-size:11px;font-weight:700;color:var(--orange);letter-spacing:.5px;border-right:1px solid rgba(255,153,51,.3);z-index:2;white-space:nowrap}
/* ── FILTER TABS ─── */
.filter-strip{display:flex;gap:5px;flex-wrap:wrap;padding:10px 0;border-bottom:1px solid var(--border);margin-bottom:14px}
.filter-btn{padding:5px 12px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;white-space:nowrap}
.filter-btn:hover{background:#1c2128;color:var(--text)}
.filter-btn.active{background:rgba(255,153,51,.15);border-color:var(--orange);color:var(--orange)}
/* ── AUTO-REFRESH PULSE ─── */
@keyframes refreshPulse{0%{opacity:1}50%{opacity:.4}100%{opacity:1}}
.refresh-live{display:inline-flex;align-items:center;gap:5px;font-size:11px;color:var(--green)}
.refresh-live .dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:refreshPulse 2s infinite}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback,useMemo}=React;

/* ── SAFE BORDER HELPER (avoids broken template-literal + CSS-var pattern) ──── */
function bc(active,col){return '1px solid '+(active?(col||'var(--orange)'):'var(--border)');}

/* ── CONSTANTS ─────────────────────────────────────────────────────────────── */
const DEPTS={

  upcl:{id:'upcl',name:'UPCL — Power Corp',nameHindi:'उत्तराखण्ड पावर कॉर्पोरेशन',icon:'⚡',color:'#8B5CF6',categories:['electricity','streetlight'],helpline:'1912',helpline2:'0135-2770501',sla:6,head:'Managing Director, UPCL',address:'Ranipur Mor, Haridwar Road, Dehradun — 249407'},
  forest:{id:'forest',name:'Forest Department',nameHindi:'वन विभाग',icon:'🌳',color:'#22c55e',categories:['tree'],helpline:'1800-180-4288',helpline2:'0135-2756083',sla:96,head:'Principal Chief Conservator of Forests',address:'Van Bhawan, Nehru Colony, Dehradun — 248001'},

  usdma:{id:'usdma',name:'USDMA — Disaster Mgmt',nameHindi:'आपदा प्रबंधन प्राधिकरण',icon:'🆘',color:'#DC2626',categories:[],helpline:'1070',helpline2:'0135-2710334',sla:2,head:'CEO, USDMA (IAS Officer)',address:'USDMA Bhawan, Rajpur Road, Dehradun — 248001'},
  police:{id:'police',name:'Uttarakhand Police',nameHindi:'उत्तराखण्ड पुलिस',icon:'🚔',color:'#60a5fa',categories:[],helpline:'100',helpline2:'112',sla:1,head:'Director General of Police, Uttarakhand',address:'Police Headquarters, Subhash Road, Dehradun — 248001'},
};
const CAT_DEPT={pothole:'pwd',garbage:'ulb',drain:'ulb',water:'jal',electricity:'upcl',streetlight:'upcl',tree:'forest',other:'pwd'};
const CATEGORIES=[
  {id:'pothole',label:'Pothole / Road Damage',icon:'🕳️'},
  {id:'garbage',label:'Garbage / Waste',icon:'🗑️'},
  {id:'water',label:'Water Supply',icon:'💧'},
  {id:'electricity',label:'Electricity / Power Cut',icon:'⚡'},
  {id:'streetlight',label:'Street Light Fault',icon:'💡'},
  {id:'drain',label:'Drain / Sewage',icon:'🌊'},
  {id:'tree',label:'Tree / Forest Issue',icon:'🌳'},
  {id:'other',label:'Other / General',icon:'📋'},
];
const SOS_CATS=[
  {id:'fire_risk',label:'Fire Risk',icon:'🔥'},{id:'road_accident',label:'Road Accident',icon:'🚗'},
  {id:'medical',label:'Medical Emergency',icon:'🏥'},{id:'water_burst',label:'Water Burst / Flood',icon:'🌊'},
  {id:'electric_hazard',label:'Electric Hazard',icon:'⚡'},{id:'infrastructure',label:'Infrastructure Collapse',icon:'🏚️'},
  {id:'women_safety',label:'Women Safety / Panic',icon:'🆘'},{id:'gas_leak',label:'Gas Leak',icon:'💨'},
];
const DISTRICTS=['Dehradun','Haridwar','Tehri Garhwal','Pauri Garhwal','Rudraprayag','Chamoli','Uttarkashi','Pithoragarh','Bageshwar','Almora','Champawat','Nainital','Udham Singh Nagar'];
const PC={P1:'badge-red',P2:'badge-orange',P3:'badge-yellow',P4:'badge-muted'};
const SC={pending:'badge-yellow',in_progress:'badge-blue',resolved:'badge-green',closed:'badge-muted'};
const SL={pending:'Pending',in_progress:'In Progress',resolved:'Resolved',closed:'Closed'};

/* ── API HELPERS ─────────────────────────────────────────────────────────────── */
const api={
  _h(t){const h={'Content-Type':'application/json'};if(t)h['Authorization']='Bearer '+t;return h;},
  async get(p,t){const r=await fetch(p,{headers:this._h(t)});if(!r.ok)throw new Error((await r.json().catch(()=>({}))).message||r.statusText);return r.json();},
  async post(p,b,t){const r=await fetch(p,{method:'POST',headers:this._h(t),body:JSON.stringify(b)});if(!r.ok)throw new Error((await r.json().catch(()=>({}))).message||r.statusText);return r.json();},
  async put(p,b,t){const r=await fetch(p,{method:'PUT',headers:this._h(t),body:JSON.stringify(b)});if(!r.ok)throw new Error((await r.json().catch(()=>({}))).message||r.statusText);return r.json();},
};

function timeAgo(iso){if(!iso)return'—';const d=Date.now()-new Date(iso).getTime();if(d<60000)return'just now';if(d<3600000)return Math.floor(d/60000)+'m ago';if(d<86400000)return Math.floor(d/3600000)+'h ago';return Math.floor(d/86400000)+'d ago';}
function fmtDate(iso){if(!iso)return'—';return new Date(iso).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'});}

/* ── WEB NOTIFICATION HELPERS ────────────────────────────────────────────────── */
function askNotify(){if('Notification'in window&&Notification.permission==='default')Notification.requestPermission().catch(()=>{});}
function pushNotify(title,body){
  if('Notification'in window&&Notification.permission==='granted'){
    try{new Notification(title,{body,icon:'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y=".9em" font-size="90">🏛️</text></svg>'});}catch(e){}
  }
}

/* ── ANIMATED COUNTER HOOK ───────────────────────────────────────────────────── */
function useCounter(target,dur){
  dur=dur||900;
  const [v,setV]=useState(0);
  useEffect(()=>{
    if(!target)return void setV(0);
    let st=null;
    const fn=ts=>{if(!st)st=ts;const p=Math.min((ts-st)/dur,1);const e=p<.5?2*p*p:1-Math.pow(-2*p+2,2)/2;setV(Math.round(e*target));if(p<1)requestAnimationFrame(fn);};
    const id=requestAnimationFrame(fn);
    return()=>cancelAnimationFrame(id);
  },[target]);
  return v;
}

/* ── TOAST ───────────────────────────────────────────────────────────────────── */
function Toast({toasts}){
  return <div style={{position:'fixed',bottom:24,right:24,zIndex:9999,display:'flex',flexDirection:'column',gap:8,pointerEvents:'none'}}>
    {toasts.map(t=><div key={t.id} className="bounce-in" style={{background:t.type==='error'?'#da3633':t.type==='success'?'#238636':'#1f6feb',color:'#fff',padding:'11px 16px',borderRadius:10,fontSize:13,fontWeight:600,maxWidth:340,boxShadow:'0 6px 24px rgba(0,0,0,.5)'}}>
      {t.type==='success'?'✓ ':t.type==='error'?'✗ ':'ℹ '}{t.msg}
    </div>)}
  </div>;
}

/* ── SPINNER ─────────────────────────────────────────────────────────────────── */
function Spinner({size}){size=size||18;return <div style={{width:size,height:size,border:'2px solid var(--border)',borderTop:'2px solid var(--orange)',borderRadius:'50%'}} className="spin"/>;}

/* ── LIVE ANNOUNCEMENTS TICKER ───────────────────────────────────────────────── */
function LiveTicker({token}){
  const [items,setItems]=useState([]);
  const [lastRefresh,setLastRefresh]=useState(Date.now());

  const load=useCallback(()=>{
    const url='/api/announcements'+(token?'':'');
    const headers=token?{Authorization:'Bearer '+token}:{};
    fetch(url,{headers}).then(r=>r.json()).then(d=>{
      if(Array.isArray(d)&&d.length>0)setItems(d.slice(0,10));
      else{
        setItems([
          {id:'a1',title:'📢 SANKALP AI — Uttarakhand Civic Portal is LIVE',priority:'normal'},
          {id:'a2',title:'🌐 File complaints, track status & get real-time updates across 8 departments',priority:'normal'},
          {id:'a3',title:'🆘 SOS Emergency? Call 112 immediately · Women Safety: 1090',priority:'urgent'},
          {id:'a4',title:'📊 All 13 Uttarakhand districts connected · Live complaint tracking active',priority:'normal'},
        ]);
      }
    }).catch(()=>{
      setItems([
        {id:'f1',title:'📢 SANKALP AI — Real-time governance for Uttarakhand',priority:'normal'},
        {id:'f2',title:'🆘 Emergency services: Police 100 · Ambulance 108 · Fire 101 · SDRF 1070',priority:'urgent'},
        {id:'f3',title:'📝 Submit civic complaints and track resolution in real-time across all 8 departments',priority:'normal'},
      ]);
    });
    setLastRefresh(Date.now());
  },[token]);

  useEffect(()=>{
    load();
    const iv=setInterval(load,30000);
    return()=>clearInterval(iv);
  },[load]);

  if(items.length===0)return null;

  const ticker=[...items,...items];
  return <div className="ticker-wrap">
    <span className="ticker-label">🔴 LIVE</span>
    <div className="ticker-inner" style={{paddingLeft:80}}>
      {ticker.map((it,i)=><span key={it.id+'_'+i}>
        <span className="ticker-item" style={{color:it.priority==='urgent'?'var(--orange)':it.priority==='important'?'var(--yellow)':'var(--text)'}}>
          {it.priority==='urgent'?'🚨 ':it.priority==='important'?'⚡ ':''}{it.title}
        </span>
        <span className="ticker-sep">◆</span>
      </span>)}
    </div>
  </div>;
}


/* ── KPI CARD ────────────────────────────────────────────────────────────────── */
function KpiCard({label,value,color,icon,sub,trend}){
  const cnt=useCounter(typeof value==='number'?value:0);
  return <div className="kpi fade-in">
    <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:4}}>
      <div className="kpi-val" style={{color:color||'var(--text)'}}>{typeof value==='number'?cnt:value}</div>
      {icon&&<div style={{fontSize:24,opacity:.65}}>{icon}</div>}
    </div>
    <div className="kpi-label">{label}</div>
    {sub&&<div style={{fontSize:11,color:'var(--muted)',marginTop:4}}>{sub}</div>}
    {trend&&<div style={{fontSize:11,marginTop:4,color:trend>0?'var(--green)':'var(--red)'}}>{trend>0?'▲':'▼'} {Math.abs(trend)}% vs last week</div>}
  </div>;
}

/* ── WORKER CARD ─────────────────────────────────────────────────────────────── */
function WorkerCard({w}){
  const sc=w.status==='active'?'var(--green)':w.status==='on_leave'?'var(--yellow)':'var(--muted)';
  const bg=w.status==='active'?'rgba(63,185,80,.1)':w.status==='on_leave'?'rgba(210,153,34,.1)':'rgba(139,148,158,.1)';
  return <div className="worker-card fade-in">
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:8}}>
      <div>
        <div style={{fontWeight:600,fontSize:13}}>{w.name}</div>
        <div style={{fontSize:11,color:'var(--muted)',marginTop:2}}>📍 {w.ward} · {w.district}</div>
      </div>
      <span style={{fontSize:10,fontWeight:700,color:sc,background:bg,padding:'3px 8px',borderRadius:10,textTransform:'uppercase'}}>{w.status||'active'}</span>
    </div>

/* ── COMPLAINT MODAL ─────────────────────────────────────────────────────────── */
function ComplaintModal({c,onClose,token,deptToken,addToast,onRefresh,isAdmin}){
  if(!c)return null;
  const [status,setStatus]=useState(c.status||'pending');
  const [note,setNote]=useState(c.adminNote||'');
  const [saving,setSaving]=useState(false);
  const dept=DEPTS[CAT_DEPT[c.category||'other']||'pwd'];

  async function save(){
    setSaving(true);
    try{
      if(isAdmin)await api.put('/api/admin/complaints/'+c.id,{status,adminNote:note},token);
      else if(deptToken)await api.put('/api/dept/complaints/'+c.id,{status},deptToken);
      onRefresh();addToast('success','Complaint updated');onClose();
    }catch(e){addToast('error',e.message);}
    setSaving(false);
  }

  return <div className="modal-overlay" onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
    <div className="modal">
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:18}}>
        <div>
          <div style={{fontSize:20,fontWeight:700,color:'var(--orange)'}}>{c.ticketId}</div>
          <div style={{fontSize:12,color:'var(--muted)',marginTop:2}}>{fmtDate(c.submittedAt)}</div>
        </div>
        <button className="btn btn-ghost btn-sm" onClick={onClose}>✕ Close</button>
      </div>
      <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:14}}>
        <span className={'badge '+(PC[c.priority]||'badge-muted')}>{c.priority}</span>
        <span className={'badge '+(SC[c.status]||'badge-muted')}>{SL[c.status]||c.status}</span>
        <span style={{fontSize:12,color:'var(--muted)'}}>{CATEGORIES.find(x=>x.id===c.category)?.icon} {c.category}</span>
      </div>
      <div style={{background:'#1c2128',borderRadius:8,padding:14,marginBottom:14,fontSize:13,lineHeight:1.65}}>{c.description}</div>
      {(c.beforePhoto||c.afterPhoto)&&<div style={{marginBottom:14}}>
        <div style={{fontSize:11,fontWeight:700,color:'var(--muted)',textTransform:'uppercase',letterSpacing:.5,marginBottom:8}}>📷 Photos</div>
        <div style={{display:'flex',gap:12,flexWrap:'wrap'}}>
          {c.beforePhoto&&<div>
            <div style={{fontSize:10,color:'var(--muted)',marginBottom:4}}>BEFORE</div>
            <img src={c.beforePhoto} alt="Before" style={{width:148,height:110,objectFit:'cover',borderRadius:8,border:'1px solid var(--border)',cursor:'pointer'}} onClick={()=>window.open(c.beforePhoto,'_blank')} onError={e=>{e.target.style.display='none'}}/>
          </div>}
          {c.afterPhoto&&<div>
            <div style={{fontSize:10,color:'var(--muted)',marginBottom:4}}>AFTER</div>
            <img src={c.afterPhoto} alt="After" style={{width:148,height:110,objectFit:'cover',borderRadius:8,border:'1px solid var(--border)',cursor:'pointer'}} onClick={()=>window.open(c.afterPhoto,'_blank')} onError={e=>{e.target.style.display='none'}}/>
          </div>}
        </div>
      </div>}
      <div className="grid2" style={{gap:10,marginBottom:14,fontSize:12}}>
        <div><div style={{color:'var(--muted)',marginBottom:2}}>LOCATION</div><div>📍 {c.location}</div></div>
        <div><div style={{color:'var(--muted)',marginBottom:2}}>DISTRICT</div><div>{c.district}</div></div>
        <div><div style={{color:'var(--muted)',marginBottom:2}}>WARD</div><div>{c.ward||'—'} (Ward #{c.wardNumber})</div></div>
        <div><div style={{color:'var(--muted)',marginBottom:2}}>FILED BY</div><div>{c.submittedBy||'Anonymous'} {c.submittedByPhone?'· '+c.submittedByPhone:''}</div></div>
        {c.workerName&&<div><div style={{color:'var(--muted)',marginBottom:2}}>WORKER</div><div>{c.workerName}</div></div>}
        <div><div style={{color:'var(--muted)',marginBottom:2}}>AI SCORE</div><div>{c.aiScore||0}/100</div></div>
      </div>
      {dept&&<div style={{background:'rgba(255,153,51,.06)',border:'1px solid rgba(255,153,51,.2)',borderRadius:8,padding:12,marginBottom:14,fontSize:12}}>
        <div style={{fontWeight:600,marginBottom:3}}>{dept.icon} Routed → {dept.name}</div>
        <div style={{color:'var(--muted)'}}>Helpline: {dept.helpline} · SLA: {dept.sla}h response</div>
      </div>}
      {c.adminNote&&<div style={{background:'rgba(88,166,255,.08)',border:'1px solid rgba(88,166,255,.2)',borderRadius:8,padding:12,marginBottom:14,fontSize:12}}>
        <div style={{fontWeight:600,color:'var(--blue)',marginBottom:4}}>🔵 Admin Note</div>
        <div style={{lineHeight:1.6}}>{c.adminNote}</div>
      </div>}
      {(isAdmin||deptToken)&&<div style={{borderTop:'1px solid var(--border)',paddingTop:16,marginTop:4}}>
        <label>Update Status</label>
        <select className="select" style={{marginBottom:12}} value={status} onChange={e=>setStatus(e.target.value)}>
          {['pending','in_progress','resolved','closed'].map(s=><option key={s} value={s}>{SL[s]}</option>)}

    </div>
  </div>;
}

function LoginScreen({onLogin}){
  const [tab,setTab]=useState('citizen');
  const [phone,setPhone]=useState('');
  const [pin,setPin]=useState('');
  const [name,setName]=useState('');
  const [district,setDistrict]=useState('Dehradun');
  const [isReg,setIsReg]=useState(false);
  const [deptId,setDeptId]=useState('pwd');
  const [code,setCode]=useState('');
  const [err,setErr]=useState('');
  const [loading,setLoading]=useState(false);

  async function doLogin(e){
    e.preventDefault();setErr('');setLoading(true);
    try{
      if(tab==='dept'){
        const d=await api.post('/api/dept/login',{departmentId:deptId,accessCode:code});
        const dept=DEPTS[deptId];
        askNotify();
        onLogin({type:'dept',deptId,deptName:dept?.name,deptToken:d.token});
      } else {
        let d;
        if(isReg){
          if(!name.trim())throw new Error('Full name is required');
          d=await api.post('/api/auth/register',{name,phone,pin,district});
        } else {
          d=await api.post('/api/auth/login',{phone,pin});
        }
        if(tab==='admin'&&d.user.role==='citizen')throw new Error('This account does not have admin privileges');
        askNotify();
        onLogin({type:'citizen',user:d.user,token:d.token});

        <div style={{fontSize:36,fontWeight:800,color:'#fff',lineHeight:1.2,marginBottom:10}}>SANKALP AI</div>
        <div style={{fontSize:16,color:'var(--orange)',fontWeight:600,marginBottom:8}}>सरकार आपके द्वार — Government at Your Doorstep</div>

          {features.map((f,i)=><div key={i} className="fade-in" style={{animationDelay:(i*.06)+'s',background:'rgba(255,153,51,.05)',border:'1px solid rgba(255,153,51,.12)',borderRadius:10,padding:'12px',textAlign:'center',cursor:'default'}}>

            <div style={{fontSize:10,color:'var(--muted)',marginTop:2}}>{f.desc}</div>

              <button key={t} onClick={()=>{setTab(t);setErr('');}} className="btn"
                style={{flex:1,justifyContent:'center',padding:'7px 4px',fontSize:11.5,background:tab===t?'var(--orange)':'transparent',color:tab===t?'#000':'var(--muted)',border:'none',borderRadius:7,transition:'all .2s'}}>

              <button className="btn btn-orange" style={{width:'100%',justifyContent:'center',padding:'12px',fontSize:14}} disabled={loading}>
                {loading?<><Spinner/> Signing in…</>:isReg?'🚀 Create Account':'🔑 Sign In'}
              </button>
              <button type="button" className="btn btn-ghost" style={{width:'100%',justifyContent:'center',marginTop:8}} onClick={()=>{setIsReg(!isReg);setErr('');}}>
                {isReg?'Already have an account? Sign in':'New user? Register here'}

          )}

          <div style={{marginTop:18,padding:'12px',background:'rgba(255,153,51,.06)',borderRadius:8,fontSize:12,color:'var(--muted)'}}>
            <div style={{fontWeight:600,marginBottom:6,color:'var(--orange)'}}>Demo Credentials</div>
            <div>Citizen: <span style={{color:'var(--orange)'}}>9876543210 / 123456</span></div>

/* ═══════════════════════════════════════════════════════════════════════════════
   CITIZEN DASHBOARD
══════════════════════════════════════════════════════════════════════════════ */
function CitizenDash({session,onLogout,addToast}){
  const {user,token}=session;
  const [page,setPage]=useState('home');
  const [complaints,setComplaints]=useState([]);
  const [sos,setSos]=useState([]);
  const [wards,setWards]=useState([]);
  const [anns,setAnns]=useState([]);

  const load=useCallback(async()=>{
    try{
      const [c,s,w,a]=await Promise.all([
        api.get('/api/complaints',token),
        api.get('/api/sos',token),
        api.get('/api/wards',token),
        api.get('/api/announcements',token),
      ]);
      setComplaints(Array.isArray(c)?c:c.complaints||[]);
      setSos(Array.isArray(s)?s:[]);
      setWards(Array.isArray(w)?w:[]);
      setAnns(Array.isArray(a)?a:[]);
    }catch(e){addToast('error','Failed to load data');}
  },[token]);

  useEffect(()=>{load();const iv=setInterval(load,6000);return()=>clearInterval(iv);},[load]);

  const mine=complaints.filter(c=>c.submittedByPhone===user.phone);
  const mySos=sos.filter(s=>s.triggeredByPhone===user.phone&&s.status!=='resolved');

  const nav=[
    {id:'home',icon:'🏠',label:'Home'},
    {id:'submit',icon:'📝',label:'Submit Issue'},
    {id:'mine',icon:'📋',label:'My Complaints'},
    {id:'sos',icon:'🆘',label:'SOS Emergency'},
    {id:'rti',icon:'📄',label:'RTI Filing'},
    {id:'map',icon:'🗺️',label:'Live Map'},
  ];

  return <div style={{display:'flex'}}>
    <Sidebar nav={nav} active={page} setActive={setPage} user={user} onLogout={onLogout} role="citizen"/>
    <div className="main" style={{display:'flex',flexDirection:'column',padding:0}}>
      <LiveTicker token={token}/>
      <div style={{padding:26,flex:1}}>
      {page==='home'&&<CitizenHome user={user} mine={mine} sos={sos} wards={wards} anns={anns} setPage={setPage}/>}
      {page==='submit'&&<SubmitComplaint token={token} user={user} onDone={()=>{load();setPage('mine');}} addToast={addToast}/>}
      {page==='mine'&&<MyComplaints complaints={mine} token={token} addToast={addToast} onRefresh={load}/>}
      {page==='sos'&&<SOSPage token={token} user={user} activeSos={mySos} addToast={addToast} onDone={load}/>}
      {page==='rti'&&<RTIPage token={token} user={user} addToast={addToast}/>}
      {page==='map'&&<LiveMapPage complaints={complaints} sos={sos} wards={wards}/>}
      </div>
    </div>
  </div>;
}

function CitizenHome({user,mine,sos,wards,anns,setPage}){
  const resolved=mine.filter(c=>c.status==='resolved').length;
  const pending=mine.filter(c=>c.status==='pending').length;
  const activeSos=sos.filter(s=>s.status==='active').length;
  const topWards=[...wards].sort((a,b)=>b.healthScore-a.healthScore).slice(0,4);

  return <div className="fade-in">
    <div className="topbar">
      <div>
        <div style={{fontSize:22,fontWeight:700}}>Welcome back, {user.name.split(' ')[0]} 👋</div>

    {urgent.length>0&&<div style={{background:'rgba(218,54,51,.1)',border:'1px solid rgba(218,54,51,.35)',borderRadius:12,padding:14,marginBottom:20}}>
      <div style={{fontWeight:700,marginBottom:8,color:'var(--red)'}}>🚨 Urgent Announcements</div>
      {urgent.map(a=><div key={a.id} style={{fontSize:13,marginBottom:4}}>• {a.title}</div>)}
    </div>}
    <div className="grid4" style={{marginBottom:20}}>
      <KpiCard label="My Total Complaints" value={mine.length} icon="📋"/>
      <KpiCard label="Resolved" value={resolved} color="var(--green)" icon="✅"/>
      <KpiCard label="Pending" value={pending} color="var(--yellow)" icon="⏳"/>
      <KpiCard label="Active SOS in District" value={activeSos} color="var(--red)" icon="🆘"/>
    </div>
    <div className="grid2" style={{marginBottom:20}}>
      <div className="card">
        <div style={{fontWeight:700,marginBottom:14,display:'flex',justifyContent:'space-between'}}>
          Recent Complaints
          <button className="btn btn-ghost btn-sm" onClick={()=>setPage('mine')}>View All →</button>
        </div>
        {mine.length===0?<div style={{color:'var(--muted)',fontSize:13,padding:'20px 0',textAlign:'center'}}>
          <div style={{fontSize:32,marginBottom:8}}>📭</div>

function SubmitComplaint({token,user,onDone,addToast}){
  const [cat,setCat]=useState('pothole');

  const [loc,setLoc]=useState('');
  const [priority,setPriority]=useState('P3');

    e.preventDefault();
    if(!desc.trim())return addToast('error','Description required');

    setLoading(true);
    try{
      const r=await api.post('/api/complaints',{category:cat,description:desc,location:loc,priority,geo:{lat:30.3165,lng:78.0322},ward:user.district+' Ward 1',wardNumber:1},token);
      setDone(r);addToast('success','Complaint submitted! Ticket: '+r.ticketId);

function LiveMapPage({complaints,sos,wards}){
  const mapRef=useRef(null);
  const mapInstRef=useRef(null);
  useEffect(()=>{
    if(!mapRef.current||mapInstRef.current)return;
    const m=L.map(mapRef.current,{center:[30.3165,78.0322],zoom:10});
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{attribution:'© CartoDB',maxZoom:19}).addTo(m);
    mapInstRef.current=m;
    complaints.slice(0,40).forEach(c=>{
      if(!c.geo)return;
      const col=c.status==='resolved'?'#3fb950':c.status==='in_progress'?'#58a6ff':'#FF9933';
      const icon=L.divIcon({html:'<div style="background:'+col+';width:12px;height:12px;border-radius:50%;border:2px solid #fff;box-shadow:0 0 6px '+col+'50"></div>',iconSize:[12,12],className:''});
      L.marker([c.geo.lat,c.geo.lng],{icon}).bindPopup('<b>'+c.ticketId+'</b><br/>'+c.category+'<br/>'+c.status).addTo(m);
    });
    sos.filter(s=>s.status==='active').forEach(s=>{
      if(!s.geo)return;
      const icon=L.divIcon({html:'<div style="background:#f85149;width:16px;height:16px;border-radius:50%;border:3px solid #fff;box-shadow:0 0 10px #f85149"></div>',iconSize:[16,16],className:''});
      L.marker([s.geo.lat,s.geo.lng],{icon}).bindPopup('<b>SOS: '+s.category+'</b><br/>'+s.location).addTo(m);
    });
    return()=>{if(mapInstRef.current){mapInstRef.current.remove();mapInstRef.current=null;}};
  },[]);

  return <div>
    <div className="topbar">
      <div style={{fontSize:20,fontWeight:700}}>🗺️ Live Civic Map — Uttarakhand</div>
      <div style={{display:'flex',gap:14,fontSize:12}}>
        {[['var(--orange)','Pending'],['var(--blue)','In Progress'],['var(--green)','Resolved'],['var(--red)','SOS']].map(([c,l])=><span key={l}><span style={{color:c}}>●</span> {l}</span>)}
      </div>
    </div>
    <div ref={mapRef} style={{height:'calc(100vh - 130px)',borderRadius:12,border:'1px solid var(--border)'}}></div>
  </div>;
}

/* ═══════════════════════════════════════════════════════════════════════════════
   DEPARTMENT DASHBOARD
══════════════════════════════════════════════════════════════════════════════ */
function DeptDash({session,onLogout,addToast}){
  const {deptId,deptName,deptToken}=session;
  const dept=DEPTS[deptId];
  const [page,setPage]=useState('overview');
  const [complaints,setComplaints]=useState([]);
  const [stats,setStats]=useState(null);
  const [liveNew,setLiveNew]=useState([]);
  const [workers,setWorkers]=useState([]);
  const [sseStatus,setSseStatus]=useState('connecting');

  const load=useCallback(async()=>{
    try{
      const [c,s]=await Promise.all([
        api.get('/api/dept/'+deptId+'/complaints',deptToken),
        api.get('/api/dept/'+deptId+'/stats',deptToken),
      ]);
      setComplaints(Array.isArray(c)?c:c.complaints||[]);
      setStats(s);
    }catch(e){addToast('error','Load failed: '+e.message);}
  },[deptId,deptToken]);

  useEffect(()=>{
    load();
    api.get('/api/dept/'+deptId+'/workers',deptToken).then(setWorkers).catch(()=>{});
    let active=true;
    (async()=>{
      try{
        const r=await fetch('/api/dept/'+deptId+'/stream',{headers:{Authorization:'Bearer '+deptToken}});
        if(!r.ok){setSseStatus('error');return;}
        setSseStatus('live');
        const reader=r.body.getReader();
        const dec=new TextDecoder();
        let buf='';
        while(active){
          const {value,done}=await reader.read();
          if(done)break;
          buf+=dec.decode(value,{stream:true});
          const lines=buf.split('\n');
          buf=lines.pop()||'';
          for(const line of lines){
            if(line.startsWith('data:')){
              try{
                const ev=JSON.parse(line.slice(5).trim());
                if(ev.type==='complaint_new'){
                  setLiveNew(p=>[ev.complaint,...p.slice(0,29)]);
                  setComplaints(p=>[ev.complaint,...p]);
                  addToast('success','New complaint: '+ev.complaint.ticketId);
                  pushNotify('New Complaint — '+dept?.name,ev.complaint.category+' · '+ev.complaint.location);
                }
              }catch{}
            }
          }
        }
      }catch(e){if(active)setSseStatus('error');}
    })();
    return()=>{active=false;};
  },[deptId,deptToken]);

  // Auto-refresh every 6 seconds for the dept dashboard
  useEffect(()=>{const iv=setInterval(load,6000);return()=>clearInterval(iv);},[load]);

  const nav=[
    {id:'overview',icon:'📊',label:'Overview'},
    {id:'live',icon:'🔴',label:'Live Feed'},
    {id:'complaints',icon:'📋',label:'All Complaints'},
    {id:'workers',icon:'👷',label:'Workers'},
    {id:'sla',icon:'⏱️',label:'SLA Tracker'},
    {id:'info',icon:'🏛️',label:'Dept Info'},
  ];

  const sseEl=<div style={{padding:'8px 10px',margin:'0 4px',borderRadius:8,background:sseStatus==='live'?'rgba(63,185,80,.1)':'rgba(248,81,73,.1)',fontSize:11,display:'flex',alignItems:'center',gap:6}}>
    <span className={'live-dot '+(sseStatus==='live'?'':'red')}></span>
    <span style={{color:sseStatus==='live'?'var(--green)':'var(--red)'}}>{sseStatus==='live'?'Live Feed Active':sseStatus==='connecting'?'Connecting…':'SSE Error'}</span>
  </div>;

  return <div style={{display:'flex'}}>
    <Sidebar nav={nav} active={page} setActive={setPage}
      user={{name:deptName||dept?.name||deptId,role:'dept',district:'All Districts'}}
      onLogout={onLogout} role="dept"
      badge={liveNew.length>0?String(liveNew.length):null} badgeFor="live"
      extra={sseEl}/>
    <div className="main" style={{display:'flex',flexDirection:'column',padding:0}}>
      <LiveTicker token={deptToken}/>
      <div style={{padding:26,flex:1}}>
      {page==='overview'&&stats&&<DeptOverview dept={dept} stats={stats} complaints={complaints} setPage={setPage}/>}
      {page==='live'&&<DeptLiveFeed liveNew={liveNew} complaints={complaints} deptToken={deptToken} addToast={addToast} onRefresh={load}/>}
      {page==='complaints'&&<DeptAllComplaints complaints={complaints} deptToken={deptToken} addToast={addToast} onRefresh={load}/>}
      {page==='workers'&&<DeptWorkers workers={workers} deptId={deptId}/>}
      {page==='sla'&&<DeptSLA complaints={complaints} dept={dept}/>}
      {page==='info'&&<DeptInfo dept={dept}/>}
      </div>
    </div>
  </div>;
}

      <KpiCard label="Pending" value={stats.pending} color="var(--yellow)" icon="⏳"/>
      <KpiCard label="In Progress" value={stats.inProgress} color="var(--blue)" icon="🔄"/>

      <div className="kpi">
        <div style={{display:'flex',justifyContent:'space-between',marginBottom:12}}>
          <div><div className="kpi-val">{rate}%</div><div className="kpi-label">Resolution Rate</div></div>
          <div style={{textAlign:'right'}}><div className="kpi-val" style={{color:'var(--red)'}}>{stats.p1Critical}</div><div className="kpi-label">P1 Critical</div></div>
        </div>
        <div className="progress"><div className="progress-bar" style={{width:rate+'%',background:rate>70?'var(--green)':rate>40?'var(--orange)':'var(--red)'}}></div></div>
        <div style={{fontSize:11,color:'var(--muted)',marginTop:8}}>Today: {stats.todayCount} new · This week: {stats.weekCount}</div>
      </div>
      <div className="card" style={{padding:'18px 20px'}}>

        {Object.entries(byP).map(([p,n])=><div key={p} style={{marginBottom:10}}>
          <div style={{display:'flex',justifyContent:'space-between',fontSize:12,marginBottom:4}}>
            <span className={'badge '+(PC[p]||'badge-muted')}>{p}</span>

        </div>)}
      </div>
    </div>
  </div>;
}

function DeptSLA({complaints,dept}){
  const slaH=dept?.sla||48;
  const now=Date.now();
  const breached=complaints.filter(c=>{
    if(c.status==='resolved'||c.status==='closed')return false;
    return (now-new Date(c.submittedAt).getTime())/3600000>slaH;
  }).sort((a,b)=>new Date(a.submittedAt)-new Date(b.submittedAt));
  const near=complaints.filter(c=>{
    if(c.status==='resolved'||c.status==='closed')return false;
    const el=(now-new Date(c.submittedAt).getTime())/3600000;
    return el>slaH*0.7&&el<=slaH;
  });

  return <div className="fade-in">
    <div className="topbar">
      <div style={{fontSize:20,fontWeight:700}}>⏱️ SLA Tracker</div>
      <div style={{color:'var(--muted)',fontSize:13}}>SLA: {slaH}h response time</div>
    </div>
    {breached.length>0&&<div style={{marginBottom:20}}>
      <div style={{fontWeight:700,color:'var(--red)',marginBottom:10}}>🔴 SLA Breached ({breached.length})</div>
      <div style={{display:'flex',flexDirection:'column',gap:8}}>
        {breached.map(c=>{
          const el=Math.round((now-new Date(c.submittedAt).getTime())/3600000);
          return <div key={c.id} className="card" style={{border:'1px solid var(--red)'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <div>
                <span style={{fontWeight:700,color:'var(--orange)'}}>{c.ticketId}</span>
                <span className="badge badge-red" style={{marginLeft:8}}>{el}h elapsed (SLA: {slaH}h)</span>
                <div style={{fontSize:13,marginTop:4}}>{c.description?.slice(0,100)}</div>
                <div style={{fontSize:12,color:'var(--muted)'}}>📍 {c.location}</div>
              </div>
              <span className={'badge '+(PC[c.priority]||'badge-muted')}>{c.priority}</span>
            </div>
          </div>;
        })}
      </div>
    </div>}
    {near.length>0&&<div style={{marginBottom:20}}>
      <div style={{fontWeight:700,color:'var(--yellow)',marginBottom:10}}>⚠️ Approaching SLA ({near.length})</div>
      <div style={{display:'flex',flexDirection:'column',gap:8}}>
        {near.map(c=>{
          const rem=slaH-Math.round((now-new Date(c.submittedAt).getTime())/3600000);
          return <div key={c.id} className="card" style={{border:'1px solid var(--yellow)'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <div>
                <span style={{fontWeight:700,color:'var(--orange)'}}>{c.ticketId}</span>
                <span className="badge badge-yellow" style={{marginLeft:8}}>{rem}h remaining</span>
                <div style={{fontSize:13,marginTop:4}}>{c.description?.slice(0,100)}</div>
              </div>
              <span className={'badge '+(PC[c.priority]||'badge-muted')}>{c.priority}</span>
            </div>
          </div>;
        })}
      </div>
    </div>}
    {breached.length===0&&near.length===0&&<div className="card" style={{textAlign:'center',padding:50}}>
      <div style={{fontSize:48,marginBottom:12}}>✅</div>
      <div style={{fontWeight:700,fontSize:18}}>All complaints within SLA!</div>
      <div style={{color:'var(--muted)',fontSize:13,marginTop:6}}>No breaches or warnings</div>
    </div>}
  </div>;
}

/* ═══════════════════════════════════════════════════════════════════════════════
   ADMIN DASHBOARD

function AdminDash({session,onLogout,addToast}){
  const {user,token}=session;
  const [page,setPage]=useState('overview');
  const [stats,setStats]=useState(null);
  const [complaints,setComplaints]=useState([]);
  const [sosAlerts,setSosAlerts]=useState([]);
  const [workers,setWorkers]=useState([]);
  const [districts,setDistricts]=useState([]);

  const load=useCallback(async()=>{
    try{
      const [s,c,sos]=await Promise.all([
        api.get('/api/admin/stats',token),
        api.get('/api/admin/complaints',token),
        api.get('/api/admin/alerts',token),
      ]);
      setStats(s);setComplaints(c);setSosAlerts(sos);
      api.get('/api/admin/workers',token).then(setWorkers).catch(()=>{});
      if(user.role==='super_admin'){api.get('/api/superadmin/districts',token).then(setDistricts).catch(()=>{});}
    }catch(e){addToast('error',e.message);}
  },[token,user.role]);

  useEffect(()=>{load();const iv=setInterval(load,6000);return()=>clearInterval(iv);},[load]);

  const nav=[
    {id:'overview',icon:'📊',label:'Overview'},
    {id:'complaints',icon:'📋',label:'All Complaints'},
    {id:'sos',icon:'🆘',label:'SOS Alerts'},
    {id:'workers',icon:'👷',label:'All Workers'},
    {id:'districts',icon:'🗺️',label:'Districts'},
    {id:'announce',icon:'📢',label:'Announcements'},
    {id:'broadcast',icon:'📣',label:'Broadcast'},
  ];

  return <div style={{display:'flex'}}>
    <Sidebar nav={nav} active={page} setActive={setPage} user={user} onLogout={onLogout} role="admin"
      badge={sosAlerts.filter(s=>s.status==='active').length>0?String(sosAlerts.filter(s=>s.status==='active').length):null} badgeFor="sos"/>
    <div className="main" style={{display:'flex',flexDirection:'column',padding:0}}>
      <LiveTicker token={token}/>
      <div style={{padding:26,flex:1}}>
      {page==='overview'&&stats&&<AdminOverview stats={stats} complaints={complaints} sosAlerts={sosAlerts} token={token} addToast={addToast} onRefresh={load}/>}
      {page==='complaints'&&<AdminComplaints complaints={complaints} token={token} addToast={addToast} onRefresh={load}/>}
      {page==='sos'&&<AdminSOS sosAlerts={sosAlerts} token={token} addToast={addToast} onRefresh={load}/>}
      {page==='workers'&&<AdminWorkers workers={workers}/>}
      {page==='districts'&&<AdminDistricts districts={districts} user={user}/>}
      {page==='announce'&&<AdminAnnouncements token={token} addToast={addToast} user={user}/>}
      {page==='broadcast'&&<AdminBroadcast token={token} addToast={addToast}/>}
      </div>
    </div>
  </div>;
}

        <div style={{display:'flex',justifyContent:'space-between',marginBottom:12}}>

          <div style={{textAlign:'right'}}><div className="kpi-val" style={{color:'var(--orange)'}}>{stats.inProgressComplaints||0}</div><div className="kpi-label">In Progress</div></div>
        </div>
        <div className="progress"><div className="progress-bar" style={{width:rate+'%',background:rate>70?'var(--green)':rate>40?'var(--orange)':'var(--red)'}}></div></div>
        <div style={{fontSize:11,color:'var(--muted)',marginTop:8}}>Today: {stats.todayComplaints||0} new · Week: {stats.weekComplaints||0}</div>
      </div>
      <div className="card">
        <div style={{fontWeight:700,marginBottom:12}}>🆘 Active SOS Feed</div>
        {sosAlerts.filter(s=>s.status==='active').length===0?
          <div style={{color:'var(--muted)',fontSize:13,textAlign:'center',padding:'12px 0'}}>✅ No active SOS alerts</div>:

    </div>
    <div className="card">
      <div style={{fontWeight:700,marginBottom:16}}>🏛️ Department-wise Performance</div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(280px,1fr))',gap:12}}>
        {Object.values(DEPTS).map(d=>{
          const dc=d.categories.length?complaints.filter(c=>d.categories.includes(c.category)):complaints;
          const dr=dc.filter(c=>c.status==='resolved'||c.status==='closed').length;
          const pct=dc.length?Math.round((dr/dc.length)*100):0;
          return <div key={d.id} style={{background:'#1c2128',borderRadius:10,padding:14,border:'1px solid var(--border)'}}>

function AdminSOS({sosAlerts,token,addToast,onRefresh}){
  const [resolving,setResolving]=useState({});
  const active=sosAlerts.filter(s=>s.status==='active');
  const responding=sosAlerts.filter(s=>s.status==='responding');
  const resolved=sosAlerts.filter(s=>s.status==='resolved').slice(0,10);

  async function resolve(id){
    setResolving(p=>({...p,[id]:true}));
    try{await api.put('/api/sos/'+id+'/resolve',{},token);onRefresh();addToast('success','SOS resolved');}
    catch(e){addToast('error',e.message);}
    setResolving(p=>({...p,[id]:false}));
  }

  function SosCard({s}){
    return <div className="card bounce-in" style={{border:'1px solid '+(s.status==='active'?'var(--red)':s.status==='responding'?'var(--orange)':'var(--border)')}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
        <div style={{flex:1}}>
          <div style={{display:'flex',gap:8,alignItems:'center',marginBottom:6,flexWrap:'wrap'}}>
            <span style={{fontWeight:700,fontSize:15}}>{SOS_CATS.find(c=>c.id===s.category)?.icon||'🆘'} {s.category?.replace('_',' ')}</span>
            <span className={'badge '+(s.status==='active'?'badge-red':s.status==='responding'?'badge-orange':'badge-green')}>{s.status}</span>
            {s.isWomenSafety&&<span className="badge badge-red">Women Safety</span>}
          </div>
          <div style={{fontSize:13,marginBottom:4}}>📍 {s.location}</div>
          <div style={{fontSize:12,color:'var(--muted)'}}>
            {s.triggeredBy&&<span>By: {s.triggeredBy} · </span>}
            {s.district&&<span>{s.district} · </span>}
            {s.nearestPoliceStation&&<span>Police: {s.nearestPoliceStation} · </span>}
            {timeAgo(s.triggeredAt)}
          </div>
        </div>
        {(s.status==='active'||s.status==='responding')&&
          <button className="btn btn-green btn-sm" onClick={()=>resolve(s.id)} disabled={resolving[s.id]}>✓ Resolve</button>}
      </div>
    </div>;
  }

  return <div className="fade-in">
    <div className="topbar">
      <div style={{fontSize:20,fontWeight:700}}>🆘 SOS Alert Management</div>
      <div style={{color:'var(--muted)',fontSize:13}}>{active.length} active · {responding.length} responding</div>
    </div>
    <div className="grid3" style={{marginBottom:20}}>
      <KpiCard label="Active Alerts" value={active.length} color="var(--red)" icon="🔴"/>
      <KpiCard label="Being Responded" value={responding.length} color="var(--orange)" icon="🚨"/>
      <KpiCard label="Resolved Total" value={sosAlerts.filter(s=>s.status==='resolved').length} color="var(--green)" icon="✅"/>
    </div>
    {active.length>0&&<div style={{marginBottom:20}}><div style={{fontWeight:700,color:'var(--red)',marginBottom:10}}>🔴 Active ({active.length})</div><div style={{display:'flex',flexDirection:'column',gap:10}}>{active.map(s=><SosCard key={s.id} s={s}/>)}</div></div>}
    {responding.length>0&&<div style={{marginBottom:20}}><div style={{fontWeight:700,color:'var(--orange)',marginBottom:10}}>🟡 Responding ({responding.length})</div><div style={{display:'flex',flexDirection:'column',gap:10}}>{responding.map(s=><SosCard key={s.id} s={s}/>)}</div></div>}
    {resolved.length>0&&<div><div style={{fontWeight:700,color:'var(--muted)',marginBottom:10}}>✅ Recently Resolved</div><div style={{display:'flex',flexDirection:'column',gap:10}}>{resolved.map(s=><SosCard key={s.id} s={s}/>)}</div></div>}
    {sosAlerts.length===0&&<div className="card" style={{textAlign:'center',padding:60}}>
      <div style={{fontSize:52,marginBottom:12}}>✅</div><div style={{fontWeight:700,fontSize:18}}>No SOS alerts</div>
    </div>}
  </div>;
}

function AdminAnnouncements({token,addToast,user}){
  const [anns,setAnns]=useState([]);
  const [title,setTitle]=useState('');
  const [body,setBody]=useState('');
  const [type,setType]=useState('general');
  const [priority,setPriority]=useState('normal');
  const [sending,setSending]=useState(false);

  useEffect(()=>{
    api.get('/api/announcements',token).then(r=>setAnns(Array.isArray(r)?r:[])).catch(()=>{});
  },[token]);

  async function post(e){
    e.preventDefault();
    if(!title.trim()||!body.trim())return addToast('error','Title and body required');
    setSending(true);
    try{
      const r=await api.post('/api/announcements',{title,body,type,priority,department:'District Administration',postedBy:user.name},token);
      setAnns(p=>[r,...p]);setTitle('');setBody('');addToast('success','Announcement posted!');
    }catch(e){addToast('error',e.message);}
    setSending(false);
  }

  return <div className="fade-in">
    <div className="topbar"><div style={{fontSize:20,fontWeight:700}}>📢 Announcements</div></div>
    <div style={{display:'grid',gridTemplateColumns:'360px 1fr',gap:20,maxWidth:1000}}>
      <form className="card" onSubmit={post}>
        <div style={{fontWeight:700,marginBottom:16}}>✍️ Post New Announcement</div>
        <div style={{marginBottom:14}}>
          <label>Title</label>
          <input className="input" placeholder="Announcement title…" value={title} onChange={e=>setTitle(e.target.value)} required/>
        </div>
        <div style={{marginBottom:14}}>
          <label>Message</label>
          <textarea className="input" rows={4} style={{resize:'vertical'}} placeholder="Detailed message…" value={body} onChange={e=>setBody(e.target.value)} required/>
        </div>
        <div style={{marginBottom:14}}>
          <label>Type</label>
          <select className="select" value={type} onChange={e=>setType(e.target.value)}>
            {['general','scheme','emergency','welfare','tender','holiday'].map(t=><option key={t} value={t}>{t.charAt(0).toUpperCase()+t.slice(1)}</option>)}
          </select>
        </div>
        <div style={{marginBottom:18}}>
          <label>Priority</label>
          <div style={{display:'flex',gap:8}}>
            {['normal','important','urgent'].map(p=><button key={p} type="button" onClick={()=>setPriority(p)}
              style={{flex:1,padding:'8px',borderRadius:8,border:bc(priority===p),background:priority===p?'rgba(255,153,51,.1)':'#1c2128',color:priority===p?'var(--orange)':'var(--muted)',cursor:'pointer',fontSize:12,fontWeight:600,transition:'all .15s'}}>
              {p}
            </button>)}
          </div>
        </div>
        <button className="btn btn-orange" style={{width:'100%',justifyContent:'center'}} disabled={sending}>
          {sending?<><Spinner/> Posting…</>:'📢 Post Announcement'}
        </button>
      </form>
      <div>
        <div style={{fontWeight:700,marginBottom:12}}>Recent Announcements ({anns.length})</div>
        <div style={{display:'flex',flexDirection:'column',gap:10}}>
          {anns.length===0?<div className="card" style={{textAlign:'center',padding:40,color:'var(--muted)'}}>No announcements yet</div>:
          anns.slice(0,15).map((a,i)=><div key={a.id} className="card fade-in" style={{animationDelay:(i*.04)+'s'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:8}}>
              <div style={{fontWeight:600,fontSize:14}}>{a.title}</div>
              <span className={'badge '+(a.priority==='urgent'?'badge-red':a.priority==='important'?'badge-orange':'badge-muted')}>{a.priority}</span>
            </div>
            <div style={{fontSize:12,color:'var(--muted)',lineHeight:1.5,marginBottom:8}}>{a.body?.slice(0,150)}{a.body?.length>150?'…':''}</div>
            <div style={{display:'flex',gap:8,fontSize:11,color:'var(--muted)'}}>
              <span>{a.type}</span><span>·</span><span>{a.department}</span><span>·</span><span>{timeAgo(a.postedAt)}</span>
            </div>
          </div>)}
        </div>
      </div>
    </div>
  </div>;
}

function AdminBroadcast({token,addToast}){
  const [msg,setMsg]=useState('');
  const [severity,setSeverity]=useState('high');
  const [sending,setSending]=useState(false);

  async function send(e){
    e.preventDefault();if(!msg.trim()){addToast('error','Message required');return;}
    setSending(true);
    try{
      await api.post('/api/admin/emergency-broadcast',{message:msg,severity},token);
      addToast('success','Broadcast sent to all connected clients!');setMsg('');
      pushNotify('Emergency Broadcast Sent','Alert delivered to all mobile app users');
    }catch(e){addToast('error',e.message);}
    setSending(false);
  }

  return <div className="fade-in">
    <div className="topbar"><div style={{fontSize:20,fontWeight:700}}>📣 Emergency Broadcast</div></div>
    <div style={{maxWidth:580}}>
      <div style={{background:'rgba(218,54,51,.08)',border:'1px solid rgba(218,54,51,.3)',borderRadius:10,padding:14,marginBottom:24,fontSize:13}}>
        ⚠️ This will broadcast a live WebSocket alert to ALL currently connected mobile app users in real-time. Use only for genuine district-wide emergencies.
      </div>
      <form className="card" onSubmit={send}>
        <div style={{marginBottom:16}}>
          <label>Severity Level</label>
          <div style={{display:'flex',gap:8}}>
            {[['low','🟢 Low'],['medium','🟡 Medium'],['high','🔴 High'],['critical','🚨 Critical']].map(([s,l])=>
              <button key={s} type="button" onClick={()=>setSeverity(s)}
                style={{flex:1,padding:'9px 4px',borderRadius:8,border:bc(severity===s),background:severity===s?'rgba(255,153,51,.1)':'#1c2128',color:severity===s?'var(--orange)':'var(--muted)',cursor:'pointer',fontSize:11,fontWeight:600,transition:'all .15s'}}>
                {l}
              </button>
            )}
          </div>
        </div>
        <div style={{marginBottom:20}}>
          <label>Broadcast Message</label>
          <textarea className="input" rows={5} style={{resize:'vertical'}} placeholder="District-wide emergency message to broadcast to all citizens…" value={msg} onChange={e=>setMsg(e.target.value)} required/>
          <div style={{fontSize:11,color:'var(--muted)',marginTop:6}}>This message will appear as a push notification and in-app alert on all connected devices.</div>
        </div>
        <button className="btn btn-red" style={{width:'100%',justifyContent:'center',padding:'13px',fontSize:14,fontWeight:700}} disabled={sending||!msg.trim()}>
          {sending?<><Spinner/> Broadcasting…</>:'📣 SEND EMERGENCY BROADCAST'}
        </button>
      </form>
    </div>
  </div>;
}

/* ═══════════════════════════════════════════════════════════════════════════════
   APP ROOT
══════════════════════════════════════════════════════════════════════════════ */
function App(){
  const [session,setSession]=useState(()=>{
    try{const s=localStorage.getItem('portal_session');return s?JSON.parse(s):null;}catch{return null;}
  });
  const [toasts,setToasts]=useState([]);

  function addToast(type,msg){
    const id=Date.now()+Math.random();
    setToasts(p=>[...p,{id,type,msg}]);
    setTimeout(()=>setToasts(p=>p.filter(t=>t.id!==id)),4500);
  }

  function login(s){
    setSession(s);
    try{localStorage.setItem('portal_session',JSON.stringify(s));}catch{}
  }

  function logout(){
    setSession(null);
    try{localStorage.removeItem('portal_session');}catch{}
  }

  const role=session?.user?.role;
  const isAdmin=role==='admin'||role==='super_admin';
  const isDept=session?.type==='dept';
  const isCitizen=session?.type==='citizen'&&!isAdmin;

  return <div>
    {!session&&<LoginScreen onLogin={login}/>}
    {isCitizen&&<CitizenDash session={session} onLogout={logout} addToast={addToast}/>}
    {isDept&&<DeptDash session={session} onLogout={logout} addToast={addToast}/>}
    {isAdmin&&<AdminDash session={session} onLogout={logout} addToast={addToast}/>}
    <Toast toasts={toasts}/>
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
